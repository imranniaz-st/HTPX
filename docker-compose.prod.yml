services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: server-manager-app:latest
    container_name: server-manager-app
    restart: always
    working_dir: /app
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-server_manager}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-laravel_secure_password}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - APP_URL=${APP_URL:-http://localhost}
    volumes:
      - ./backend:/app
      - ./storage/logs:/app/storage/logs
    expose:
      - "8000"
    depends_on:
      - mysql
      - redis
    networks:
      - server-manager-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mysql:
    image: mysql:8.0
    container_name: server-manager-mysql
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-server_manager}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secure_password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-laravel_secure_password}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_INITDB_SKIP_TZINFO: "yes"
    volumes:
      - dbdata:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    expose:
      - "3306"
    networks:
      - server-manager-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: server-manager-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redisdata:/data
    expose:
      - "6379"
    networks:
      - server-manager-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  websocket:
    image: node:18-alpine
    container_name: server-manager-websocket
    restart: always
    working_dir: /app
    command: npm run websocket
    volumes:
      - ./backend:/app
    expose:
      - "6001"
    networks:
      - server-manager-network
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: server-manager-nginx
    restart: always
    ports:
      - "8001:80"
      - "8443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend/dist:/app/frontend/dist:ro
      - ./backend/public:/app/backend/public:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - server-manager-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  dbdata:
  redisdata:

networks:
  server-manager-network:
    driver: bridge
