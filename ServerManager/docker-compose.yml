version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: server-manager-app
    restart: unless-stopped
    working_dir: /app
    environment:
      - DB_HOST=mysql
      - DB_DATABASE=${DB_DATABASE:-server_manager}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD:-laravel}
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - redis
    networks:
      - server-manager-network

  mysql:
    image: mysql:8.0
    container_name: server-manager-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-server_manager}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - server-manager-network

  redis:
    image: redis:7-alpine
    container_name: server-manager-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - server-manager-network

  websocket:
    image: node:18-alpine
    container_name: server-manager-websocket
    working_dir: /app
    command: npm run websocket
    volumes:
      - ./backend:/app
    ports:
      - "6001:6001"
    depends_on:
      - redis
    networks:
      - server-manager-network

volumes:
  dbdata:

networks:
  server-manager-network:
    driver: bridge
